<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Obra Cloud v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #ef4444; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="font-bold uppercase text-sm md:text-lg">Constructora - Control Cloud</h1>
        <div id="statusCloud" class="text-[10px] bg-emerald-500 px-2 py-1 rounded font-bold">NUBE OK</div>
    </header>

    <main class="p-4 md:p-8 flex flex-col md:flex-row gap-6">
        <div class="w-full md:w-1/3 bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-600 h-fit">
            <h2 class="font-bold text-gray-700 mb-4 uppercase text-xs">Registrar Operación</h2>
            <form id="formMovimiento" class="space-y-4">
                <input type="date" id="fecha" required class="w-full p-2 border rounded">
                <select id="obraSelect" required class="w-full p-2 border rounded bg-white">
                    <option value="" disabled selected>Cargando obras...</option>
                </select>
                <input type="text" id="obraNuevaInput" placeholder="Nombre obra nueva..." class="w-full mt-1 p-2 border border-blue-400 rounded hidden bg-blue-50">
                <select id="tipoOperacion" required class="w-full p-2 border rounded">
                    <option value="" disabled selected>Tipo de Operación...</option>
                    <option value="Cobro de pagos">Cobro de pagos</option>
                    <option value="Pagos de jornales">Pagos de jornales</option>
                    <option value="Materiales / insumos">Materiales / insumos</option>
                    <option value="Otras operaciones">Otras operaciones</option>
                </select>
                <input type="text" id="descripcion" placeholder="Descripción" required class="w-full p-2 border rounded">
                <div class="grid grid-cols-2 gap-2">
                    <select id="cuenta" class="p-2 border rounded"><option value="Ivan">Ivan</option><option value="Mario">Mario</option></select>
                    <select id="tipoMov" class="p-2 border rounded font-bold"><option value="ingreso">INGRESO (+)</option><option value="egreso">EGRESO (-)</option></select>
                </div>
                <input type="number" id="monto" placeholder="Monto $" step="0.01" required class="w-full p-3 border rounded text-xl font-bold text-right">
                <button type="submit" id="btnGuardar" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow hover:bg-blue-700 transition">GUARDAR</button>
            </form>
        </div>

        <div class="w-full md:w-2/3 space-y-6">
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white p-3 rounded shadow border-l-4 border-blue-500"><p class="text-[9px] font-bold text-gray-400">IVAN</p><p id="saldoIvan" class="text-sm md:text-lg font-bold">$ 0,00</p></div>
                <div class="bg-white p-3 rounded shadow border-l-4 border-emerald-500"><p class="text-[9px] font-bold text-gray-400">MARIO</p><p id="saldoMario" class="text-sm md:text-lg font-bold">$ 0,00</p></div>
                <div class="bg-slate-800 text-white p-3 rounded shadow"><p class="text-[9px] font-bold text-slate-400">TOTAL</p><p id="saldoTotal" class="text-sm md:text-lg font-bold text-orange-400">$ 0,00</p></div>
            </div>

            <div class="bg-white rounded-xl shadow overflow-hidden border border-gray-200">
                <table class="w-full text-xs md:text-sm text-left">
                    <thead class="bg-gray-100 text-[10px] text-gray-500 uppercase">
                        <tr>
                            <th class="p-3">Obra / Operación</th>
                            <th class="p-3">Detalle</th>
                            <th class="p-3 text-right">Monto</th>
                            <th class="p-3 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbynyTLycYStCGfYLVWodAniGJxv52k-2xiRxQhF4zTYTk33drfWvUf_lbKOCq4uLYniRA/exec"; 
        let movimientos = [];

        async function cargarDatos() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                movimientos = data.map(r => ({ id: r[0], fecha: r[1], obra: r[2], operacion: r[3], desc: r[4], cuenta: r[5], tipo: r[6], monto: parseFloat(r[7]) }));
                actualizarInterfaz();
            } catch (e) { console.log("Error de conexión"); }
        }

        // FUNCIÓN PARA BORRAR
        async function borrarEntrada(id) {
            if (!confirm("¿Seguro que quieres borrar este movimiento?")) return;
            
            document.getElementById('statusCloud').innerText = "BORRANDO...";
            document.getElementById('statusCloud').className = "text-[10px] bg-red-500 px-2 py-1 rounded font-bold";

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "DELETE", id: id })
                });
                
                // Borrar localmente para actualización rápida
                movimientos = movimientos.filter(m => m.id != id);
                actualizarInterfaz();
                alert("✓ Eliminado correctamente");
            } catch (e) {
                alert("Error al borrar");
            } finally {
                document.getElementById('statusCloud').innerText = "NUBE OK";
                document.getElementById('statusCloud').className = "text-[10px] bg-emerald-500 px-2 py-1 rounded font-bold";
            }
        }

        document.getElementById('formMovimiento').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            const obraFinal = document.getElementById('obraSelect').value === "NUEVA" ? document.getElementById('obraNuevaInput').value.trim() : document.getElementById('obraSelect').value;
            const mov = { id: Date.now(), fecha: document.getElementById('fecha').value, obra: obraFinal, operacion: document.getElementById('tipoOperacion').value, descripcion: document.getElementById('descripcion').value, cuenta: document.getElementById('cuenta').value, tipo: document.getElementById('tipoMov').value, monto: parseFloat(document.getElementById('monto').value) };

            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(mov) });
                movimientos.push({ id: mov.id, fecha: mov.fecha, obra: mov.obra, operacion: mov.operacion, desc: mov.descripcion, cuenta: mov.cuenta, tipo: mov.tipo, monto: mov.monto });
                e.target.reset();
                actualizarInterfaz();
            } catch (err) { alert("Error"); }
            btn.innerText = "GUARDAR"; btn.disabled = false;
        };

        function actualizarInterfaz() {
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';
            let sIvan = 0, sMario = 0;

            [...movimientos].reverse().forEach(m => {
                const val = m.tipo === 'ingreso' ? m.monto : -m.monto;
                m.cuenta === 'Ivan' ? sIvan += val : sMario += val;

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="p-3 font-bold">${m.obra}<br><span class="text-[9px] text-blue-600">${m.operacion}</span></td>
                        <td class="p-3 text-gray-500">${m.desc}<br><span class="text-[8px] uppercase font-bold">${m.fecha} | ${m.cuenta}</span></td>
                        <td class="p-3 text-right font-bold ${m.tipo === 'ingreso' ? 'text-green-600' : 'text-red-600'}">
                            $${m.monto.toLocaleString('es-AR')}
                        </td>
                        <td class="p-3 text-center">
                            <button onclick="borrarEntrada(${m.id})" class="bg-red-500 hover:bg-red-700 text-white w-8 h-8 rounded shadow-md transition-all active:scale-90">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>`;
            });

            document.getElementById('saldoIvan').innerText = "$ " + sIvan.toLocaleString('es-AR');
            document.getElementById('saldoMario').innerText = "$ " + sMario.toLocaleString('es-AR');
            document.getElementById('saldoTotal').innerText = "$ " + (sIvan + sMario).toLocaleString('es-AR');
            actualizarListaObras([...new Set(movimientos.map(m => m.obra))]);
        }

        function actualizarListaObras(obras) {
            const select = document.getElementById('obraSelect');
            const actual = select.value;
            select.innerHTML = '<option value="" disabled selected>Seleccione Obra...</option>';
            obras.filter(Boolean).sort().forEach(o => { select.innerHTML += `<option value="${o}">${o}</option>`; });
            select.innerHTML += '<option value="NUEVA" class="text-blue-600 font-bold">+ AGREGAR NUEVA OBRA</option>';
            if (actual) select.value = actual;
        }

        document.getElementById('obraSelect').onchange = (e) => {
            document.getElementById('obraNuevaInput').classList.toggle('hidden', e.target.value !== 'NUEVA');
        };

        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
        cargarDatos();
    </script>
</body>
</html>
