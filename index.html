<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control v14.0 - Edición Habilitada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Inter', sans-serif; }
        .main-content { height: calc(100vh - 64px - 70px); overflow-y: auto; }
        @media (min-width: 768px) { .main-content { height: calc(100vh - 64px); } }
        .sidebar-constructora { background-color: #0f172a; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        .nav-link.active { color: #3b82f6; border-top: 4px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        @media (min-width: 768px) { .nav-link.active { border-left: 4px solid #3b82f6; border-top: none; color: white; } }
        th { position: sticky; top: 0; z-index: 20; background: #0f172a; cursor: pointer; }
        .editing-mode { border: 4px solid #f59e0b !important; background-color: #fffbeb !important; }
    </style>
</head>
<body class="bg-slate-100 flex flex-col">

    <header class="h-16 bg-slate-900 text-white flex justify-between items-center px-4 z-50 shadow-xl">
        <div class="flex items-center gap-3">
            <h1 class="font-black text-blue-500 italic text-lg uppercase tracking-tighter">Control de Caja</h1>
        </div>
        <button onclick="location.reload()" class="text-slate-500 hover:text-white"><i class="fas fa-sync-alt"></i></button>
    </header>

    <div class="flex flex-col md:flex-row flex-grow overflow-hidden">
        <nav class="sidebar-constructora fixed bottom-0 left-0 w-full h-[70px] md:relative md:w-64 md:h-full flex md:flex-col justify-around md:justify-start md:pt-6 z-50">
            <button onclick="showPage('registro')" id="btn-registro" class="nav-link active flex flex-col md:flex-row items-center gap-2 md:p-5 text-slate-400">
                <i class="fas fa-wallet text-xl"></i><span class="text-[10px] font-bold uppercase">Caja</span>
            </button>
        </nav>

        <main class="flex-grow main-content p-4 bg-slate-50">
            <div id="page-registro" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-blue-500"><span class="text-[10px] font-black text-slate-400">IVAN</span><p id="saldoIvan" class="text-2xl font-black">$ 0,00</p></div>
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-emerald-500"><span class="text-[10px] font-black text-slate-400">MARIO</span><p id="saldoMario" class="text-2xl font-black">$ 0,00</p></div>
                    <div class="bg-slate-800 p-5 rounded-3xl shadow-lg"><span class="text-[10px] font-black text-orange-400">TOTAL EN VISTA</span><p id="saldoTotal" class="text-2xl font-black text-orange-400">$ 0,00</p></div>
                </div>

                <div class="flex flex-col xl:flex-row gap-6">
                    <div id="formContainer" class="w-full xl:w-80 bg-white p-6 rounded-3xl shadow-xl border-t-8 border-blue-600 h-fit shrink-0 transition-all">
                        <div id="editBadge" class="hidden mb-2 bg-orange-500 text-white text-[9px] font-black py-1 px-3 rounded-full uppercase text-center animate-pulse">Modo Edición Activado</div>
                        <form id="formMovimiento" class="space-y-3">
                            <input type="hidden" id="editId">
                            <input type="date" id="fecha" required class="w-full p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold">
                            <select id="obraSelect" required class="w-full p-3 border-2 rounded-xl text-sm font-bold bg-white"></select>
                            <input type="text" id="obraNuevaInput" placeholder="Nombre obra..." class="w-full p-3 border-2 border-blue-300 rounded-xl hidden italic text-sm">
                            <select id="tipoOperacion" required class="w-full p-3 border-2 rounded-xl text-sm font-bold bg-white">
                                <option value="" disabled selected>Categoría...</option>
                                <option value="Cobro de pagos">Cobro de pagos</option>
                                <option value="Pagos de jornales">Pagos de jornales</option>
                                <option value="Materiales / insumos">Materiales / insumos</option>
                            </select>
                            <input type="text" id="descripcion" placeholder="Detalle..." required class="w-full p-3 border-2 rounded-xl text-sm">
                            <div class="grid grid-cols-2 gap-2">
                                <select id="cuenta" class="p-3 border-2 rounded-xl font-black text-xs"><option value="Ivan">Ivan</option><option value="Mario">Mario</option></select>
                                <select id="tipoMov" class="p-3 border-2 rounded-xl font-black text-xs"><option value="ingreso">Ingreso (+)</option><option value="egreso">Egreso (-)</option></select>
                            </div>
                            <div class="relative">
                                <input type="text" id="montoVisual" placeholder="0,00" required class="w-full p-4 border-4 bg-slate-50 rounded-2xl text-2xl font-black text-right outline-none">
                                <input type="hidden" id="montoReal">
                            </div>
                            <button type="submit" id="btnGuardar" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-xs tracking-widest active:scale-95 transition-all">Ingresar Movimiento</button>
                            <button type="button" id="btnCancelarEdit" onclick="cancelarEdicion()" class="hidden w-full bg-slate-200 text-slate-600 font-bold py-2 rounded-xl text-[10px] uppercase">Cancelar Edición</button>
                        </form>
                    </div>

                    <div class="flex-grow bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                        <div class="p-4 bg-slate-900 flex flex-col md:flex-row justify-between gap-4">
                            <input type="text" id="tablaFiltro" onkeyup="filtrarYRecalcular()" placeholder="Buscar..." class="w-full md:w-80 p-3 bg-slate-800 rounded-xl text-xs text-white outline-none">
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left" id="mainTable">
                                <thead class="text-slate-400 text-[10px] font-black uppercase bg-slate-900">
                                    <tr>
                                        <th class="p-4" onclick="ordenarYRenderizar('fecha')">Fecha</th>
                                        <th class="p-4" onclick="ordenarYRenderizar('obra')">Obra</th>
                                        <th class="p-4">Descripción</th>
                                        <th class="p-4 text-center">Titular</th>
                                        <th class="p-4 text-right" onclick="ordenarYRenderizar('monto_real')">Monto</th>
                                        <th class="p-4 text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaBody" class="text-[11px] divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzbYMOqEUdxIcv8We4PbbvTc7441LPn2e_bw6OsIGUhwBDfve1IRaD5zrQCDzXQaEk05A/exec";
        let movimientos = [];
        let movMostrados = [];
        let configOrden = { clave: 'fecha', asc: false };

        async function cargarDatos() {
            const r = await fetch(WEB_APP_URL);
            const d = await r.json();
            movimientos = d.map(r => ({ 
                id: r[0], fecha: r[1], obra: r[2], operacion: r[3], desc: r[4], cuenta: r[5], tipo: r[6], 
                monto: parseFloat(r[7]), monto_real: (r[6] === 'ingreso' ? parseFloat(r[7]) : -parseFloat(r[7])) 
            }));
            movMostrados = [...movimientos];
            renderizarTabla();
        }

        function renderizarTabla() {
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';
            let sI=0, sM=0;

            movMostrados.forEach(m => {
                if(m.cuenta === 'Ivan') sI += m.monto_real; else sM += m.monto_real;
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50">
                        <td class="p-4 font-bold text-slate-400">${new Date(m.fecha).toLocaleDateString('es-AR')}</td>
                        <td class="p-4 font-black uppercase">${m.obra}</td>
                        <td class="p-4 text-slate-600">${m.desc}</td>
                        <td class="p-4 text-center"><span class="px-2 py-0.5 rounded text-[9px] font-black ${m.cuenta==='Ivan'?'bg-blue-600 text-white':'bg-emerald-600 text-white'}">${m.cuenta.toUpperCase()}</span></td>
                        <td class="p-4 text-right font-black ${m.tipo==='ingreso'?'text-emerald-600':'text-red-500'}">$ ${m.monto.toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
                        <td class="p-4 text-center whitespace-nowrap">
                            <button onclick="prepararEdicion(${m.id})" class="text-orange-400 hover:text-orange-600 mr-3"><i class="fas fa-edit"></i></button>
                            <button onclick="borrarRemoto(${m.id})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('saldoIvan').innerText = "$ " + sI.toLocaleString('es-AR');
            document.getElementById('saldoMario').innerText = "$ " + sM.toLocaleString('es-AR');
            document.getElementById('saldoTotal').innerText = "$ " + (sI+sM).toLocaleString('es-AR');
            actualizarSelectObras();
        }

        function prepararEdicion(id) {
            const m = movimientos.find(x => x.id === id);
            if (!m) return;

            document.getElementById('editId').value = m.id;
            document.getElementById('fecha').value = new Date(m.fecha).toISOString().split('T')[0];
            document.getElementById('obraSelect').value = m.obra;
            document.getElementById('tipoOperacion').value = m.operacion;
            document.getElementById('descripcion').value = m.desc;
            document.getElementById('cuenta').value = m.cuenta;
            document.getElementById('tipoMov').value = m.tipo;
            document.getElementById('montoReal').value = m.monto.toFixed(2);
            document.getElementById('montoVisual').value = m.monto.toLocaleString('es-AR', {minimumFractionDigits:2});

            // Estilos de edición
            document.getElementById('formContainer').classList.add('editing-mode');
            document.getElementById('editBadge').classList.remove('hidden');
            document.getElementById('btnCancelarEdit').classList.remove('hidden');
            document.getElementById('btnGuardar').innerText = "Actualizar Movimiento";
            document.getElementById('btnGuardar').classList.replace('bg-blue-600', 'bg-orange-500');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicion() {
            document.getElementById('formMovimiento').reset();
            document.getElementById('editId').value = "";
            document.getElementById('formContainer').classList.remove('editing-mode');
            document.getElementById('editBadge').classList.add('hidden');
            document.getElementById('btnCancelarEdit').classList.add('hidden');
            document.getElementById('btnGuardar').innerText = "Ingresar Movimiento";
            document.getElementById('btnGuardar').classList.replace('bg-orange-500', 'bg-blue-600');
        }

        document.getElementById('formMovimiento').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            const editId = document.getElementById('editId').value;
            btn.disabled = true; btn.innerText = "PROCESANDO...";

            const m = parseFloat(document.getElementById('montoReal').value);
            const mov = {
                action: editId ? "update" : "insert",
                id: editId ? parseInt(editId) : Date.now(),
                fecha: document.getElementById('fecha').value,
                obra: document.getElementById('obraSelect').value,
                operacion: document.getElementById('tipoOperacion').value,
                descripcion: document.getElementById('descripcion').value,
                cuenta: document.getElementById('cuenta').value,
                tipo: document.getElementById('tipoMov').value,
                monto: m
            };

            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(mov) });
            
            // Recargar localmente para ver cambios
            if(editId) {
                const idx = movimientos.findIndex(x => x.id == editId);
                movimientos[idx] = { ...mov, desc: mov.descripcion, monto_real: (mov.tipo==='ingreso'?m:-m) };
            } else {
                movimientos.unshift({ ...mov, desc: mov.descripcion, monto_real: (mov.tipo==='ingreso'?m:-m) });
            }
            
            movMostrados = [...movimientos];
            cancelarEdicion();
            renderizarTabla();
            btn.disabled = false;
        };

        async function borrarRemoto(id) {
            if(!confirm("¿Borrar definitivamente?")) return;
            movimientos = movimientos.filter(m => m.id !== id);
            movMostrados = movMostrados.filter(m => m.id !== id);
            renderizarTabla();
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", id: id }) });
        }

        // Lógica de ordenamiento, filtros y montos igual a v13.8...
        function filtrarYRecalcular() {
            const b = document.getElementById("tablaFiltro").value.toLowerCase();
            movMostrados = movimientos.filter(m => m.obra.toLowerCase().includes(b) || m.desc.toLowerCase().includes(b) || m.cuenta.toLowerCase().includes(b));
            renderizarTabla();
        }

        function ordenarYRenderizar(clave) {
            configOrden.asc = configOrden.clave === clave ? !configOrden.asc : true;
            configOrden.clave = clave;
            movMostrados.sort((a,b) => (a[clave] < b[clave] ? -1 : 1) * (configOrden.asc ? 1 : -1));
            renderizarTabla();
        }

        const vIn = document.getElementById('montoVisual');
        const rIn = document.getElementById('montoReal');
        vIn.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, "");
            let num = parseFloat(val) / 100 || 0;
            rIn.value = num.toFixed(2);
            vIn.value = num.toLocaleString('es-AR', { minimumFractionDigits: 2 });
        });

        function actualizarSelectObras() {
            const obras = [...new Set(movimientos.map(m => m.obra))].filter(Boolean).sort();
            document.getElementById('obraSelect').innerHTML = '<option disabled selected>Obra...</option>' + obras.map(o => `<option value="${o}">${o}</option>`).join('') + '<option value="NUEVA">+ NUEVA</option>';
        }

        window.onload = cargarDatos;
        document.getElementById('obraSelect').onchange = (e) => document.getElementById('obraNuevaInput').classList.toggle('hidden', e.target.value !== 'NUEVA');
    </script>
</body>
</html>
