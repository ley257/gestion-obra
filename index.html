<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Constructora Pro v11.5 - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .main-content { height: calc(100vh - 64px - 70px); overflow-y: auto; }
        @media (min-width: 768px) { .main-content { height: calc(100vh - 64px); } }
        .nav-link.active { color: #3b82f6; border-top: 4px solid #3b82f6; }
        @media (min-width: 768px) { .nav-link.active { background: #0f172a; border-left: 4px solid #3b82f6; border-top: none; color: white; } }
        .chart-box { position: relative; height: 260px !important; width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Estilos Login */
        #loginOverlay {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
    </style>
</head>
<body class="bg-slate-100 flex flex-col">

    <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-slate-900 p-8 text-center">
                <div class="inline-block p-4 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-500/20">
                    <i class="fas fa-hard-hat text-white text-3xl"></i>
                </div>
                <h2 class="text-white font-black text-xl uppercase tracking-tighter italic">Panel de Control</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Constructora Master v11.5</p>
            </div>
            <div class="p-8 space-y-4">
                <div id="loginError" class="hidden bg-red-50 text-red-500 text-[11px] font-black p-3 rounded-xl border border-red-100 text-center uppercase">
                    Usuario o clave incorrectos
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Usuario</label>
                    <input type="text" id="userInput" placeholder="Nombre de usuario" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Contraseña</label>
                    <input type="password" id="passInput" placeholder="••••••••" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold focus:border-blue-500 outline-none transition-all">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-600/20 uppercase text-xs tracking-[0.2em] transition-all active:scale-95">
                    Entrar al Sistema
                </button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden flex flex-col h-full">
        
        <header class="h-16 bg-slate-900 text-white flex justify-between items-center px-4 shrink-0 z-50 shadow-lg">
            <h1 class="font-black text-blue-500 italic text-sm md:text-lg uppercase tracking-tighter">Constructora Master</h1>
            <div class="flex items-center gap-3">
                <div id="statusCloud" class="hidden md:block text-[9px] bg-emerald-600 px-3 py-1 rounded-full font-black text-white italic">CONECTADO</div>
                <button onclick="logout()" class="text-slate-400 hover:text-white transition-colors"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="flex flex-col md:flex-row flex-grow overflow-hidden">
            <nav class="fixed bottom-0 left-0 w-full h-[70px] bg-slate-900 md:relative md:w-64 md:h-full flex md:flex-col justify-around md:justify-start md:pt-6 z-50">
                <button onclick="showPage('registro')" id="btn-registro" class="nav-link active flex flex-col md:flex-row items-center gap-2 md:p-5 text-slate-400">
                    <i class="fas fa-cash-register text-xl"></i><span class="text-[10px] font-bold uppercase">Caja</span>
                </button>
                <button onclick="showPage('presupuestos')" id="btn-presupuestos" class="nav-link flex flex-col md:flex-row items-center gap-2 md:p-5 text-slate-400">
                    <i class="fas fa-tasks text-xl"></i><span class="text-[10px] font-bold uppercase">Obras</span>
                </button>
                <button onclick="showPage('graficas')" id="btn-graficas" class="nav-link flex flex-col md:flex-row items-center gap-2 md:p-5 text-slate-400">
                    <i class="fas fa-chart-line text-xl"></i><span class="text-[10px] font-bold uppercase">Balance</span>
                </button>
            </nav>

            <main class="flex-grow main-content p-4 overflow-y-auto bg-slate-100 no-scrollbar">
                
                <div id="page-registro" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white p-4 rounded-2xl shadow border-l-4 border-blue-500"><span class="text-[9px] font-black text-slate-400 uppercase">Ivan</span><p id="saldoIvan" class="text-xl font-black text-slate-800">$ 0</p></div>
                        <div class="bg-white p-4 rounded-2xl shadow border-l-4 border-emerald-500"><span class="text-[9px] font-black text-slate-400 uppercase">Mario</span><p id="saldoMario" class="text-xl font-black text-slate-800">$ 0</p></div>
                        <div class="bg-slate-800 p-4 rounded-2xl shadow"><span class="text-[9px] font-black text-slate-500 uppercase">Total</span><p id="saldoTotal" class="text-xl font-black text-orange-400">$ 0</p></div>
                    </div>

                    <div class="flex flex-col lg:flex-row gap-6">
                        <div class="w-full lg:w-80 bg-white p-6 rounded-3xl shadow-xl border-t-8 border-blue-600">
                            <form id="formMovimiento" class="space-y-4">
                                <h3 class="font-black text-slate-800 text-[10px] uppercase tracking-widest italic mb-2">Nuevo Registro</h3>
                                <input type="date" id="fecha" required class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl text-sm font-bold">
                                <select id="obraSelect" required class="w-full p-3 border-2 border-slate-100 rounded-xl text-sm font-bold bg-white"></select>
                                <input type="text" id="obraNuevaInput" placeholder="Nombre obra nueva..." class="w-full p-3 border-2 border-blue-300 rounded-xl hidden bg-blue-50 italic text-sm">
                                <select id="tipoOperacion" required class="w-full p-3 border-2 border-slate-100 rounded-xl text-sm font-bold bg-white">
                                    <option value="" disabled selected>Operación...</option>
                                    <option value="Cobro de pagos">Cobro de pagos</option>
                                    <option value="Pagos de jornales">Pagos de jornales</option>
                                    <option value="Materiales / insumos">Materiales / insumos</option>
                                    <option value="Otras operaciones">Otras operaciones</option>
                                </select>
                                <input type="text" id="descripcion" placeholder="Detalle..." required class="w-full p-3 border-2 border-slate-100 rounded-xl text-sm font-medium">
                                <div class="grid grid-cols-2 gap-2">
                                    <select id="cuenta" class="p-3 border-2 border-slate-100 rounded-xl font-black text-xs"><option value="Ivan">Ivan</option><option value="Mario">Mario</option></select>
                                    <select id="tipoMov" class="p-3 border-2 border-slate-100 rounded-xl font-black text-xs text-blue-600"><option value="ingreso">Ingreso (+)</option><option value="egreso">Egreso (-)</option></select>
                                </div>
                                <div class="relative">
                                    <span class="absolute left-4 top-4 text-slate-300 font-black text-xl">$</span>
                                    <input type="text" id="montoVisual" placeholder="0,00" required class="w-full p-4 pl-10 border-4 border-slate-50 rounded-2xl text-2xl font-black text-right text-slate-800 bg-slate-50 outline-none">
                                    <input type="hidden" id="montoReal">
                                </div>
                                <button type="submit" id="btnGuardar" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 uppercase text-xs tracking-widest">Sincronizar Datos</button>
                            </form>
                        </div>

                        <div class="flex-grow bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-200">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="bg-slate-50 text-[9px] font-black uppercase text-slate-500 border-b">
                                        <tr><th class="p-4">Obra / Fecha</th><th class="p-4 text-center">Cuenta</th><th class="p-4 text-right">Monto</th></tr>
                                    </thead>
                                    <tbody id="tablaBody" class="text-xs divide-y divide-slate-50 font-medium"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="page-presupuestos" class="hidden space-y-4">
                    <div class="bg-slate-900 p-6 rounded-3xl text-white shadow-2xl border-b-8 border-blue-500">
                        <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Cobranzas Estimadas (30 días)</p>
                        <p id="proyeccion30" class="text-4xl font-black tracking-tighter">$ 0</p>
                    </div>
                    <div id="containerPresupuestos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>

                <div id="page-graficas" class="hidden space-y-6">
                    <div class="bg-white p-5 rounded-3xl shadow-lg flex flex-col md:flex-row justify-between items-center gap-4">
                        <select id="filtroObra" onchange="updateCharts()" class="w-full md:w-auto p-3 border-2 rounded-xl text-xs font-black uppercase bg-slate-50"></select>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Rentabilidad</p>
                            <p id="rentabilidadValor" class="text-3xl font-black">$ 0,00</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-100">
                            <p class="text-center font-black text-slate-500 text-[10px] uppercase mb-6 tracking-widest">Ingresos vs Gastos</p>
                            <div class="chart-box" id="chartBoxBar"><canvas id="chartBarras"></canvas></div>
                        </div>
                        <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-100">
                            <p class="text-center font-black text-slate-500 text-[10px] uppercase mb-6 tracking-widest">Distribución de Gastos</p>
                            <div class="chart-box" id="chartBoxPie"><canvas id="chartTorta"></canvas></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- LOGICA DE LOGIN ---
        function handleLogin() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const error = document.getElementById('loginError');

            if(user === 'admin' && pass === '1234') {
                sessionStorage.setItem('isLogged', 'true');
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                cargarDatos();
            } else {
                error.classList.remove('hidden');
                setTimeout(() => { error.classList.add('hidden'); }, 3000);
            }
        }

        function logout() {
            sessionStorage.removeItem('isLogged');
            location.reload();
        }

        // --- RESTO DE LA LOGICA DEL SISTEMA ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzbYMOqEUdxIcv8We4PbbvTc7441LPn2e_bw6OsIGUhwBDfve1IRaD5zrQCDzXQaEk05A/exec";
        let movimientos = [];
        let pLocal = JSON.parse(localStorage.getItem('presupuestos_v10.7')) || {};
        let chartBarras = null, chartTorta = null;

        const vInput = document.getElementById('montoVisual');
        const rInput = document.getElementById('montoReal');

        vInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, "");
            let numericValue = parseFloat(value) / 100;
            if (isNaN(numericValue)) { rInput.value = 0; vInput.value = ""; return; }
            rInput.value = numericValue.toFixed(2);
            vInput.value = numericValue.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        });

        function showPage(p) {
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('btn-'+p).classList.add('active');
            if(p === 'graficas') setTimeout(updateCharts, 200);
            if(p === 'presupuestos') renderPresupuestos();
        }

        async function cargarDatos() {
            try {
                const r = await fetch(WEB_APP_URL);
                const d = await r.json();
                movimientos = d.map(r => ({ id: r[0], fecha: r[1], obra: r[2], operacion: r[3], desc: r[4], cuenta: r[5], tipo: r[6], monto: parseFloat(r[7]) }));
                actualizarInterfaz();
            } catch(e) { console.error("Error remoto", e); }
        }

        function actualizarInterfaz() {
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';
            let sI=0, sM=0;
            [...movimientos].reverse().forEach(m => {
                const val = m.tipo === 'ingreso' ? m.monto : -m.monto;
                if(m.cuenta === 'Ivan') sI += val; else sM += val;
                const f = m.fecha.split('-');
                tbody.innerHTML += `<tr>
                    <td class="p-4"><b>${m.obra}</b><br><span class="text-slate-400 text-[9px]">${f[2]}/${f[1]}/${f[0]}</span></td>
                    <td class="p-4 text-center"><span class="${m.cuenta === 'Ivan' ? 'badge-ivan' : 'badge-mario'}">${m.cuenta.toUpperCase()}</span></td>
                    <td class="p-4 text-right font-black ${m.tipo === 'ingreso' ? 'text-emerald-600' : 'text-red-500'}">$${m.monto.toLocaleString('es-AR', {minimumFractionDigits:2})}</td>
                </tr>`;
            });
            document.getElementById('saldoIvan').innerText = "$ " + sI.toLocaleString('es-AR', {minimumFractionDigits:2});
            document.getElementById('saldoMario').innerText = "$ " + sM.toLocaleString('es-AR', {minimumFractionDigits:2});
            document.getElementById('saldoTotal').innerText = "$ " + (sI+sM).toLocaleString('es-AR', {minimumFractionDigits:2});
            
            const obras = [...new Set(movimientos.map(m => m.obra))].filter(Boolean).sort();
            document.getElementById('obraSelect').innerHTML = '<option disabled selected>Seleccionar Obra...</option>' + obras.map(o => `<option value="${o}">${o}</option>`).join('') + '<option value="NUEVA" class="text-blue-600 font-black">+ CREAR NUEVA</option>';
            document.getElementById('filtroObra').innerHTML = '<option value="TODAS">RESUMEN GENERAL</option>' + obras.map(o => `<option value="${o}">${o}</option>`).join('');
        }

        function updateCharts() {
            const fO = document.getElementById('filtroObra').value || 'TODAS';
            const filt = movimientos.filter(m => fO === 'TODAS' || m.obra === fO);
            const ing = filt.filter(m => m.tipo === 'ingreso').reduce((a, b) => a + b.monto, 0);
            const egr = filt.filter(m => m.tipo === 'egreso').reduce((a, b) => a + b.monto, 0);
            
            const rVal = document.getElementById('rentabilidadValor');
            rVal.innerText = "$ " + (ing-egr).toLocaleString('es-AR', {minimumFractionDigits:2});
            rVal.className = `text-3xl font-black ${ing-egr >= 0 ? 'text-emerald-500' : 'text-red-500'}`;

            document.getElementById('chartBoxBar').innerHTML = '<canvas id="chartBarras"></canvas>';
            document.getElementById('chartBoxPie').innerHTML = '<canvas id="chartTorta"></canvas>';

            new Chart(document.getElementById('chartBarras'), {
                type: 'bar',
                data: { labels: ['Ingresos','Egresos'], datasets: [{ data:[ing, egr], backgroundColor:['#10b981','#ef4444'], borderRadius: 12 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const cats = {}; 
            filt.filter(m => m.tipo === 'egreso').forEach(m => cats[m.operacion] = (cats[m.operacion]||0)+m.monto);
            new Chart(document.getElementById('chartTorta'), {
                type: 'doughnut',
                data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: ['#3b82f6','#f59e0b','#8b5cf6','#ec4899','#64748b'] }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
            });
        }

        function renderPresupuestos() {
            const cont = document.getElementById('containerPresupuestos');
            cont.innerHTML = '';
            let totalP = 0; const hoy = new Date(); const lim = new Date(); lim.setDate(hoy.getDate()+30);
            Object.keys(pLocal).forEach(o => {
                const p = pLocal[o];
                const cob = movimientos.filter(m => m.obra === o && m.operacion === 'Cobro de pagos').reduce((a, b) => a + b.monto, 0);
                let ac = p.montoAnticipo;
                if(cob < p.montoAnticipo) totalP += (p.montoAnticipo - cob);
                p.cronograma.forEach(c => {
                    ac += c.monto;
                    if(cob < ac && new Date(c.vence) <= lim) totalP += c.monto - Math.max(0, cob - (ac - c.monto));
                });
                const por = ((cob*100)/p.total).toFixed(0);
                cont.innerHTML += `<div class="bg-white p-5 rounded-3xl shadow-md border border-slate-100">
                    <h4 class="font-black text-xs uppercase text-slate-700">${o}</h4>
                    <p class="text-orange-500 font-black text-lg mt-1">$ ${(p.total - cob).toLocaleString('es-AR')}</p>
                    <div class="w-full bg-slate-100 h-2 mt-4 rounded-full overflow-hidden"><div class="bg-blue-600 h-full" style="width:${por}%"></div></div>
                </div>`;
            });
            document.getElementById('proyeccion30').innerText = "$ " + totalP.toLocaleString('es-AR', {minimumFractionDigits:2});
        }

        document.getElementById('formMovimiento').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar'); btn.innerText = "PROCESANDO..."; btn.disabled = true;
            const o = document.getElementById('obraSelect').value === "NUEVA" ? document.getElementById('obraNuevaInput').value.trim() : document.getElementById('obraSelect').value;
            const mov = { id: Date.now(), fecha: document.getElementById('fecha').value, obra: o, operacion: document.getElementById('tipoOperacion').value, descripcion: document.getElementById('descripcion').value, cuenta: document.getElementById('cuenta').value, tipo: document.getElementById('tipoMov').value, monto: parseFloat(rInput.value) };
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(mov) });
            movimientos.push({...mov, desc: mov.descripcion});
            actualizarInterfaz();
            e.target.reset(); rInput.value = ""; vInput.value = "";
            btn.innerText = "Sincronizar Datos"; btn.disabled = false;
        };

        // Verificación de sesión al cargar
        window.onload = () => {
            if(sessionStorage.getItem('isLogged') === 'true') {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                cargarDatos();
            }
        };

        document.getElementById('obraSelect').onchange = (e) => document.getElementById('obraNuevaInput').classList.toggle('hidden', e.target.value !== 'NUEVA');
        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
