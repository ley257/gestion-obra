<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de ingresos y egresos v13.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .main-content { height: calc(100vh - 64px - 70px); overflow-y: auto; }
        @media (min-width: 768px) { .main-content { height: calc(100vh - 64px); } }
        
        .sidebar-constructora {
            background-color: #0f172a;
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        .nav-link.active { color: #3b82f6; border-top: 4px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        @media (min-width: 768px) { .nav-link.active { background: #1e293b; border-left: 4px solid #3b82f6; border-top: none; color: white; } }
        
        .sort-btn:hover { background-color: rgba(255,255,255,0.1); cursor: pointer; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Estilos para la tabla responsive */
        .table-container { max-height: 500px; overflow-y: auto; }
        th { position: sticky; top: 0; z-index: 10; }
    </style>
</head>
<body class="bg-slate-100 flex flex-col">

    <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border-b-8 border-blue-600">
            <div class="bg-slate-900 p-8 text-center sidebar-constructora">
                <div class="inline-block p-4 bg-blue-600 rounded-2xl mb-4 shadow-lg"><i class="fas fa-hammer text-white text-3xl"></i></div>
                <h2 class="text-white font-black text-xl uppercase italic">Control de ingresos y egresos</h2>
            </div>
            <div class="p-8 space-y-4">
                <input type="text" id="userInput" placeholder="Usuario" class="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold outline-none focus:border-blue-500">
                <input type="password" id="passInput" placeholder="Contraseña" class="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold outline-none focus:border-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase text-xs tracking-widest active:scale-95 transition-all">Ingresar</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden flex flex-col h-full">
        <header class="h-16 bg-slate-900 text-white flex justify-between items-center px-4 shrink-0 z-50">
            <div class="flex items-center gap-3">
                <img src="https://github.com/ley257/gestion-obra/blob/main/tu-logo.png?raw=true" alt="Logo" class="h-8 bg-white p-0.5 rounded" onerror="this.style.display='none'">
                <h1 class="font-black text-blue-500 italic text-xs md:text-lg uppercase tracking-tighter">Control de ingresos y egresos</h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="hidden md:block text-[9px] bg-emerald-600 px-3 py-1 rounded-full font-black text-white italic uppercase">Sincronizado a la nube</div>
                <button onclick="logout()" class="text-slate-500 hover:text-white"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <div class="flex flex-col md:flex-row flex-grow overflow-hidden">
            <nav class="sidebar-constructora fixed bottom-0 left-0 w-full h-[70px] md:relative md:w-64 md:h-full flex md:flex-col justify-around md:justify-start md:pt-6 z-50">
                <button onclick="showPage('registro')" id="btn-registro" class="nav-link active flex flex-col md:flex-row items-center gap-2 md:p-5 text-slate-400">
                    <i class="fas fa-wallet text-xl"></i><span class="text-[10px] font-bold uppercase">Caja</span>
                </button>
                <button onclick="showPage('presupuestos')" id="btn-presupuestos" class="nav-link flex flex-col md:flex-row items-center gap-2 md:p-5 text-slate-400">
                    <i class="fas fa-drafting-compass text-xl"></i><span class="text-[10px] font-bold uppercase">Obras</span>
                </button>
                <button onclick="showPage('graficas')" id="btn-graficas" class="nav-link flex flex-col md:flex-row items-center gap-2 md:p-5 text-slate-400">
                    <i class="fas fa-chart-pie text-xl"></i><span class="text-[10px] font-bold uppercase">Balance</span>
                </button>
            </nav>

            <main class="flex-grow main-content p-4 overflow-y-auto no-scrollbar bg-slate-50">
                
                <div id="page-registro" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Ivan</span><p id="saldoIvan" class="text-xl font-black text-slate-800">$ 0</p></div>
                        <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-emerald-500"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Mario</span><p id="saldoMario" class="text-xl font-black text-slate-800">$ 0</p></div>
                        <div class="bg-slate-800 p-4 rounded-2xl shadow-sm"><span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Total Efectivo</span><p id="saldoTotal" class="text-xl font-black text-orange-400">$ 0</p></div>
                    </div>

                    <div class="flex flex-col xl:flex-row gap-6">
                        <div class="w-full xl:w-80 bg-white p-6 rounded-3xl shadow-lg border-t-8 border-blue-600 h-fit">
                            <form id="formMovimiento" class="space-y-3">
                                <label class="text-[10px] font-black text-slate-400 uppercase">Datos del movimiento</label>
                                <input type="date" id="fecha" required class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl text-sm font-bold">
                                <select id="obraSelect" required class="w-full p-3 border-2 border-slate-100 rounded-xl text-sm font-bold bg-white"></select>
                                <input type="text" id="obraNuevaInput" placeholder="Nombre obra nueva..." class="w-full p-3 border-2 border-blue-300 rounded-xl hidden bg-blue-50 italic text-sm">
                                <select id="tipoOperacion" required class="w-full p-3 border-2 border-slate-100 rounded-xl text-sm font-bold bg-white">
                                    <option value="" disabled selected>Categoría...</option>
                                    <option value="Cobro de pagos">Cobro de pagos</option>
                                    <option value="Pagos de jornales">Pagos de jornales</option>
                                    <option value="Materiales / insumos">Materiales / insumos</option>
                                    <option value="Otras operaciones">Otras operaciones</option>
                                </select>
                                <input type="text" id="descripcion" placeholder="Descripción / Detalle" required class="w-full p-3 border-2 border-slate-100 rounded-xl text-sm">
                                <div class="grid grid-cols-2 gap-2">
                                    <select id="cuenta" class="p-3 border-2 border-slate-100 rounded-xl font-black text-xs"><option value="Ivan">Ivan</option><option value="Mario">Mario</option></select>
                                    <select id="tipoMov" class="p-3 border-2 border-slate-100 rounded-xl font-black text-xs text-blue-600"><option value="ingreso">Ingreso (+)</option><option value="egreso">Egreso (-)</option></select>
                                </div>
                                <div class="relative">
                                    <span class="absolute left-4 top-4 text-slate-300 font-black text-xl">$</span>
                                    <input type="text" id="montoVisual" placeholder="0,00" required class="w-full p-4 pl-10 border-4 border-slate-50 rounded-2xl text-2xl font-black text-right text-slate-800 bg-slate-50">
                                    <input type="hidden" id="montoReal">
                                </div>
                                <button type="submit" id="btnGuardar" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest hover:bg-blue-700 transition-all">Ingresar movimiento</button>
                            </form>
                        </div>

                        <div class="flex-grow bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-200">
                            <div class="p-4 bg-slate-50 border-b flex flex-col md:flex-row justify-between gap-4 items-center">
                                <div class="relative w-full md:w-72">
                                    <i class="fas fa-search absolute left-4 top-3.5 text-slate-400 text-xs"></i>
                                    <input type="text" id="tablaFiltro" onkeyup="filtrarTabla()" placeholder="Buscar en registros..." class="w-full pl-10 pr-4 py-3 bg-white border-2 border-slate-100 rounded-xl text-xs font-bold outline-none focus:border-blue-500">
                                </div>
                                <button onclick="exportToExcel()" class="w-full md:w-auto bg-slate-800 text-white text-[9px] font-black px-4 py-3 rounded-xl hover:bg-blue-600 transition-colors uppercase tracking-widest">
                                    <i class="fas fa-file-excel mr-2"></i> Exportar Reporte
                                </button>
                            </div>
                            
                            <div class="table-container overflow-x-auto no-scrollbar">
                                <table class="w-full text-left border-collapse" id="mainTable">
                                    <thead class="bg-slate-900 text-white text-[9px] font-black uppercase tracking-widest italic">
                                        <tr>
                                            <th class="p-4 sort-btn" onclick="ordenarTabla(1)">Fecha <i class="fas fa-sort ml-1 opacity-50"></i></th>
                                            <th class="p-4 sort-btn" onclick="ordenarTabla(2)">Obra <i class="fas fa-sort ml-1 opacity-50"></i></th>
                                            <th class="p-4 sort-btn" onclick="ordenarTabla(3)">Categoría <i class="fas fa-sort ml-1 opacity-50"></i></th>
                                            <th class="p-4 sort-btn" onclick="ordenarTabla(4)">Descripción <i class="fas fa-sort ml-1 opacity-50"></i></th>
                                            <th class="p-4 sort-btn text-center" onclick="ordenarTabla(5)">Titular <i class="fas fa-sort ml-1 opacity-50"></i></th>
                                            <th class="p-4 sort-btn text-right" onclick="ordenarTabla(7)">Monto <i class="fas fa-sort ml-1 opacity-50"></i></th>
                                        </tr>
                                    </thead>
                                    <tbody id="tablaBody" class="text-[11px] divide-y divide-slate-100 font-medium text-slate-700">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="page-presupuestos" class="hidden">...</div>
                <div id="page-graficas" class="hidden">...</div>
            </main>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzbYMOqEUdxIcv8We4PbbvTc7441LPn2e_bw6OsIGUhwBDfve1IRaD5zrQCDzXQaEk05A/exec";
        let movimientos = [];
        let ordenAsc = true;

        // LOGIN & NAVEGACIÓN
        function handleLogin() {
            if(document.getElementById('userInput').value==='admin' && document.getElementById('passInput').value==='1234'){
                sessionStorage.setItem('logged', 'true');
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                cargarDatos();
            }
        }
        function logout() { sessionStorage.clear(); location.reload(); }
        function showPage(p) {
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('btn-'+p).classList.add('active');
        }

        // CARGA Y RENDER
        async function cargarDatos() {
            try {
                const r = await fetch(WEB_APP_URL);
                const d = await r.json();
                movimientos = d.map(r => ({ id: r[0], fecha: r[1], obra: r[2], operacion: r[3], desc: r[4], cuenta: r[5], tipo: r[6], monto: parseFloat(r[7]) }));
                actualizarInterfaz();
            } catch(e) { console.error(e); }
        }

        function formatFecha(stringFecha) {
            const d = new Date(stringFecha);
            return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;
        }

        function actualizarInterfaz() {
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';
            let sI=0, sM=0;
            
            movimientos.forEach(m => {
                const val = m.tipo === 'ingreso' ? m.monto : -m.monto;
                if(m.cuenta === 'Ivan') sI += val; else sM += val;
                
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50 transition-colors">
                        <td class="p-4 font-bold text-slate-400 whitespace-nowrap">${formatFecha(m.fecha)}</td>
                        <td class="p-4 font-black uppercase text-slate-800">${m.obra}</td>
                        <td class="p-4 text-slate-500 italic">${m.operacion}</td>
                        <td class="p-4 text-slate-600 font-semibold">${m.desc}</td>
                        <td class="p-4 text-center"><span class="px-2 py-1 rounded-lg text-[9px] font-black ${m.cuenta==='Ivan'?'bg-blue-100 text-blue-700':'bg-emerald-100 text-emerald-700'}">${m.cuenta.toUpperCase()}</span></td>
                        <td class="p-4 text-right font-black ${m.tipo === 'ingreso' ? 'text-emerald-600' : 'text-red-500'}">$ ${m.monto.toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
                    </tr>`;
            });
            document.getElementById('saldoIvan').innerText = "$ " + sI.toLocaleString('es-AR',{minimumFractionDigits:2});
            document.getElementById('saldoMario').innerText = "$ " + sM.toLocaleString('es-AR',{minimumFractionDigits:2});
            document.getElementById('saldoTotal').innerText = "$ " + (sI+sM).toLocaleString('es-AR',{minimumFractionDigits:2});
            
            const obras = [...new Set(movimientos.map(m => m.obra))].filter(Boolean).sort();
            document.getElementById('obraSelect').innerHTML = '<option disabled selected>Obra...</option>' + obras.map(o => `<option value="${o}">${o}</option>`).join('') + '<option value="NUEVA" class="text-blue-600 font-black">+ CREAR NUEVA</option>';
        }

        // FUNCIONES DE TABLA: FILTRO Y ORDEN
        function filtrarTabla() {
            const input = document.getElementById("tablaFiltro").value.toLowerCase();
            const rows = document.getElementById("tablaBody").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                const text = rows[i].textContent.toLowerCase();
                rows[i].style.display = text.includes(input) ? "" : "none";
            }
        }

        function ordenarTabla(colIndex) {
            const claves = ["id", "fecha", "obra", "operacion", "desc", "cuenta", "tipo", "monto"];
            const clave = claves[colIndex-1];
            
            movimientos.sort((a, b) => {
                let valA = a[clave], valB = b[clave];
                if(typeof valA === 'string') {
                    return ordenAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
                } else {
                    return ordenAsc ? valA - valB : valB - valA;
                }
            });
            
            ordenAsc = !ordenAsc;
            actualizarInterfaz();
        }

        // INPUTS DE MONTO
        const vInput = document.getElementById('montoVisual');
        const rInput = document.getElementById('montoReal');
        vInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, "");
            let num = parseFloat(val) / 100;
            if (isNaN(num)) { rInput.value = 0; vInput.value = ""; return; }
            rInput.value = num.toFixed(2);
            vInput.value = num.toLocaleString('es-AR', { minimumFractionDigits: 2 });
        });

        // ENVÍO DE DATOS
        document.getElementById('formMovimiento').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar'); btn.innerText = "PROCESANDO..."; btn.disabled = true;
            const o = document.getElementById('obraSelect').value === "NUEVA" ? document.getElementById('obraNuevaInput').value : document.getElementById('obraSelect').value;
            const mov = { id: Date.now(), fecha: document.getElementById('fecha').value, obra: o, operacion: document.getElementById('tipoOperacion').value, descripcion: document.getElementById('descripcion').value, cuenta: document.getElementById('cuenta').value, tipo: document.getElementById('tipoMov').value, monto: parseFloat(rInput.value) };
            
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(mov) });
            movimientos.unshift({...mov, desc: mov.descripcion});
            actualizarInterfaz();
            e.target.reset(); rInput.value=""; vInput.value="";
            btn.innerText = "Ingresar movimiento"; btn.disabled = false;
        };

        window.onload = () => { if(sessionStorage.getItem('logged')) handleLogin(); };
        document.getElementById('obraSelect').onchange = (e) => document.getElementById('obraNuevaInput').classList.toggle('hidden', e.target.value !== 'NUEVA');
        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
